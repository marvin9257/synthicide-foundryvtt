    class="p1">Recovery functions (§100): You don’t bleed out and die when left
    wounded after a battle. You also regain an extra +5 HP from any surgery and
    +10 HP per week from natural healing.</p></li><li><p class="p1">Cellular
    stacking (§200): You gain 15 max HP. You may pay an additional §300 to
    increase this to 30 max HP.</p></li></ul>
