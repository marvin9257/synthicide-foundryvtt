  description: >-
    <p>Increase your toughness by +1. Additional mods:</p><ul><li><p
    class="p1">Enhanced (§400): Increase the bonus to +2.</p></li><li><p
    class="p1">Superior (§1200): Increase the bonus to +3. Discount this by the
    price of enhanced if it was purchased before this.</p></li><li><p
    class="p1">Drug storage (§30): When you knowingly consume a drug, you may
    reserve the effect in your nanites for later use instead of benefiting
