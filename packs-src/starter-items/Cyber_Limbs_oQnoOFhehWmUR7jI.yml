system:
  description: >-
    <p>Increase your combat by +1. Additional mods:</p><ul><li><p
    class="p1">Enhanced (<span class="s1">§</span>400): Increase the bonus to
    +2.</p></li><li><p class="p1">Superior (<span class="s1">§</span>1200):
    Increase the bonus to +3. Discount this by the price of enhanced if it was
    purchased before this.</p></li><li><p class="p1">Exo-lifts (<span
    class="s1">§</span>100): Additional micro-servos grant you +2 to any
    toughness checks involving feats of strength, such as lifting objects or
    forcing open doors.</p></li><li><p class="p1">Burn protocol (<span
    class="s1">§</span>180): Hormones and overdriven servos create temporary
    strength, but damage your body. Before making a toughness check, you may
    burn HP to gain a bonus. For every 10 HP you burn, add +2 to the
    roll.</p></li><li><p class="p1">Extra arm (<span class="s1">§</span>300):
    You gain an additional arm and hand with which to hold objects or take
    actions, but you do not gain extra AP to manipulate it simultaneously with
    your other limbs. You can take this mod up to four times. Each extra arm
    grants a +2 bonus on rolls to initiate or resist a melee
    takedown.</p></li><li><p>Retractable item (<span class="s1">§</span>150):
    You can store a one-handed weapon or tool inside a cyber arm of your choice.
    Observers must beat an awareness RD 5 to detect it during a stripped search.
    You can increase the RD to 12 for an additional <span
    class="s1">§</span>100. The stored item can be drawn into the same arm’s
    hand for no AP, and it cannot be forcefully disarmed. You may take this mod
    for each arm you possess.</p></li></ul>
