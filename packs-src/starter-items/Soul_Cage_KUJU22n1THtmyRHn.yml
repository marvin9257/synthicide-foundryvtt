system:
  description: >-
    <p>Originally designed to suppress trauma responses in battle, this system
    is now favored by criminals to dull emotional fallout. During any play
    session, you can activate the soul cage. While active, you gain no mental
    traumas (if using those rules) and no cynicism from abhorrent acts, but you
    also gain no resolve at the end of the session.</p><ul><li><p
    class="p1">Acceptance meditations (<span class="s1">§</span>80): When
    spending resolve to reduce cynicism, remove 2 points instead of
    1.</p></li><li><p class="p1">Dark switch (<span class="s1">§</span>300):
    When activating the soul cage, you can still earn up to 1 resolve at the end
    of the session if you would have gained at least 3 cynicism.</p></li></ul>
