system:
  description: >-
    <p>Your fists gain +1 ATT and +1 DMG (instead of +0/−3), including attacks
    made with extra arms. You can install melee weapon mods on your hands,
    paying once to apply the mod to all hands. You may treat your fists as both
    primitive and non-primitive for weapon mods, proficiencies, and battle
    powers. If you wield another martial weapon, you must choose between using
    the weapon or your fists.</p><ul><li><p>Enhanced (<span
    class="s1">§</span>400): Increase the bonus to +2.</p></li><li><p
    class="p1">Superior (<span class="s1">§</span>1200): Increase the bonus to
    +3. Discount this by the price of enhanced if it was purchased before
    this.</p></li><li><p class="p1">Gecko grip (<span
    class="s1">§</span>100/<span class="s1">§</span>300): Gain +4 to rolls made
    to climb; increase to +7 for an additional <span
    class="s1">§</span>200.</p></li><li><p class="p1">Retractable blades (<span
    class="s1">§</span>30): Extend blades to gain the counter ability. Awareness
    RD 5 to detect during a strip search; increase to RD 12 for an additional
    <span class="s1">§</span>100.</p></li><li><p class="p1">Finger tools (<span
    class="s1">§</span>110): Built-in multi-tools count as a basic tool kit.
    Upgrade to a crafting kit for <span class="s1">§</span>300 more. Awareness
    RD 5 to detect during a strip search; increase to RD 12 for an additional
    <span class="s1">§</span>100.</p></li></ul>
