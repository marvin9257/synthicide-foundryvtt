    - description: Gain any 2 psychic powers, so long as you meet the requirements.
    - description: >-
        You are a psychic that struggles to function without Illuminix, an
        addictive and illegal substance traded underground. Every day you must
        consume doses of Illuminix equal to the highest level psychic power you
        want to use (1 dose to access 1st level powers, 4 doses for 4th level
        powers, etc). A Bulbhead who fails to score a dose of Illuminix is
        wracked with withdrawal, unable to access psychic powers and suffering
        -2 to every attribute. A single dose lifts the penalty.
    - description: >-
        After character creation, you may purchase new psychic powers with 1
        less trait point.
