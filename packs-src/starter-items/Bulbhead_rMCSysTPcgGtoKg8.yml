img: systems/synthicide/assets/icons/items/aspect.svg
system:
  description: >-
    You are a psychic that struggles to function without Illuminix, an addictive
    and illegal substance traded underground.
  featureType: aspect
  traits:
    - name: Attribute Increase
      sort: 10
      description: >-
        +1 × 2, divided between awareness, influence, and nerve as you choose.
        (Awareness and Influence chosen by default)
    - name: Attribute Penalty (Mandatory)
      sort: 20
      description: >-
        -1 to any one attribute except awareness, influence, and nerve. (combat
        selected by default)
  aspectType: bulbhead
  abilities:
    - description: Gain any 2 psychic powers, so long as you meet the requirements.
    - description: >-
        You are a psychic who depends on Illuminix, an illegal and addictive
        drug. Choose any 2 psychic powers you qualify for. Each day, you must
        take a number of Illuminix doses equal to the highest level of power you
        wish to use (1 dose for 1st level powers, 4 doses for 4th level, and so
        on). If  you don’t take enough to access higher-level powers, you lose
        the bonuses those powers provide to lower levels.
    - description: >-
        After character creation, you may purchase new psychic powers for 1 less
        trait point.
