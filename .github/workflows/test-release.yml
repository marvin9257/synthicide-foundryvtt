name: Release
on:
  push:
    branches: [ main, beta ]
permissions:
  contents: write
  issues: write
  pull-requests: write
  packages: write
jobs:
  release:
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
      - name: Install dependencies
        run: npm install
      - name: Lint code
        run: npm run lint
      # Packs are rebuilt and project is built by the semantic-release prepareCmd
      - name: Semantic Release
        run: npx semantic-release
      - name: "Debug: Show version in dist/system.json (if exists)"
        run: |
          if [ -f dist/system.json ]; then
            echo "dist/system.json version:" && jq .version dist/system.json
          else
            echo "dist/system.json not found (no release made, or build failed)."
            # Do not fail the workflow if no release was made
            exit 0
          fi


