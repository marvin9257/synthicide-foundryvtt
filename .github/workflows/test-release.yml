name: Test and (Manual) Release

on:
  workflow_dispatch:  # Only run when manually triggered from GitHub UI

env:
  node_version: 24

jobs:
  release:
    name: Semantic Release (Manual Only)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.node_version }}

      - name: Install dependencies
        run: npm install

      - name: Install semantic-release and plugins
        run: |
          npm install --no-save semantic-release @semantic-release/changelog @semantic-release/git @semantic-release/github

      - name: Run semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx semantic-release

# Notes:
# - semantic-release will handle versioning, changelog, manifest update, and GitHub release/tag creation.
# - Configure .releaserc to update system.json, CHANGELOG.md, and upload assets as needed.
# - This workflow will only run when manually triggered from the Actions UI.
