name: Test and Release (Push)

on:
  push:
    branches: [ main, beta ]  # Run on direct push to main or beta

env:
  node_version: 24
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    name: Semantic Release (Push)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.node_version }}


      - name: Install dependencies
        run: npm install

      - name: Install semantic-release and plugins
        run: |
          npm install --no-save semantic-release @semantic-release/changelog @semantic-release/git @semantic-release/github

      - name: Build (create dist/)
        run: npm run build

      - name: Get next release version from semantic-release
        id: get_version
        run: |
          VERSION=$(npx semantic-release --dry-run --branches=${{ github.ref_name }} --ci --no-ci false --plugins=@semantic-release/commit-analyzer,@semantic-release/release-notes-generator,@semantic-release/changelog,@semantic-release/git,@semantic-release/github --stdout --json | jq -r '.nextRelease.version // empty')
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "Next release version: $VERSION"

      - name: Update system.json version in dist and root
        run: |
          node scripts/update-system-json-version.js $VERSION

      - name: Debug GitHub Token User
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          curl -H "Authorization: token $GH_TOKEN" https://api.github.com/user

      - name: Set git remote to use PAT
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          git remote set-url origin https://$GH_TOKEN@github.com/marvin9257/synthicide-foundryvtt.git


      - name: Zip dist contents for FVTT release
        if: success()
        run: |
          cd dist
          zip -r ../synthicide.zip .
          cd ..
        shell: bash


      - name: Move manifest for release asset
        if: success()
        run: |
          cp dist/system.json ./system.json
        shell: bash

      - name: Run semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
        run: npx semantic-release

# Notes:
# - semantic-release will handle versioning, changelog, manifest update, and GitHub release/tag creation.
# - Configure .releaserc to update system.json, CHANGELOG.md, and upload assets as needed.
# - This workflow will only run on direct push to main or beta (not on PRs or manual runs).
# - Requires a Personal Access Token (PAT) with repo and workflow scopes stored as GH_TOKEN in repository secrets.
# - need a new release test
